<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
    font-size:32px;
}

.input-box{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#f2f2f2;
    font-size:16px;
}

input:focus{
    background:#e8f0fe;
    border:2px solid #4facfe;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#777;
}

</style>

</head>

<body>

<div class="container">

    <h2>AI Interview Login</h2>

    <form th:action="@{/login}" method="post">

        <div class="input-box">
            <input 
                type="email" 
                name="username"
                placeholder="Enter Email"
                required
            >
        </div>

        <div class="input-box">
            <input 
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        AI Mock Interview System
    </div>

</div>

</body>
</html>
