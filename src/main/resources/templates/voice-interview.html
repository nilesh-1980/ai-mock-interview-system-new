<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Voice Interview</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:750px;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.question-box{
    background:#fff3f0;
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
}

.question{
    color:#333;
    line-height:1.7;
}

.category{
    margin-top:10px;
    color:#ff5e62;
    font-weight:bold;
    font-size:18px;
}

.mic-box{
    text-align:center;
    margin-top:20px;
}

.mic-btn{
    width:90px;
    height:90px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    color:white;
    font-size:35px;
    cursor:pointer;
    transition:0.3s;
}

.mic-btn:hover{
    transform:scale(1.1);
}

.status{
    margin-top:15px;
    color:#666;
    font-weight:bold;
}

textarea{
    width:100%;
    height:180px;
    margin-top:25px;
    padding:15px;
    border-radius:12px;
    border:2px solid #ddd;
    resize:none;
    font-size:16px;
}

textarea:focus{
    outline:none;
    border-color:#ff5e62;
}

.submit-btn{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:0.9;
}

.bottom-links{
    margin-top:25px;
    text-align:center;
}

.bottom-links a{
    text-decoration:none;
    color:#555;
    font-weight:bold;
}

.info{
    margin-top:10px;
    text-align:center;
    color:#777;
}

</style>

</head>

<body>

<div class="container">

    <h1>🎤 AI Voice Interview</h1>

    <div class="question-box">

        <h2 class="question"
            th:text="${question != null ? question.questionText : 'No Question Found'}">
        </h2>

        <div class="category">

            Category:
            <span th:text="${category}"></span>

        </div>

    </div>

    <form th:action="@{/user/submit-answer}"
          method="post">

        <!-- QUESTION -->

        <input type="hidden"
               name="question"
               th:value="${question.questionText}">

        <!-- MODE -->

        <input type="hidden"
               name="mode"
               value="voice">

        <!-- CATEGORY -->

        <input type="hidden"
               name="category"
               th:value="${category}">

        <!-- MIC BUTTON -->

        <div class="mic-box">

            <button type="button"
                    class="mic-btn"
                    onclick="startListening()">

                🎤

            </button>

            <div class="status"
                 id="status">

                Click mic and start speaking

            </div>

        </div>

        <!-- ANSWER -->

        <textarea id="answer"
                  name="answer"
                  placeholder="Your voice answer will appear here..."
                  required>
        </textarea>

        <div class="info">

            AI will convert your speech into text automatically.

        </div>

        <button type="submit"
                class="submit-btn">

            Submit Answer

        </button>

    </form>

    <div class="bottom-links">

        <a href="/dashboard">
            ← Back To Dashboard
        </a>

    </div>

</div>

<script>

// SPEAK QUESTION

window.onload = function(){

    const question =
    document.querySelector(".question").innerText;

    const speech =
    new SpeechSynthesisUtterance(question);

    speech.lang = "en-US";

    speech.rate = 1;

    window.speechSynthesis.speak(speech);
};


// VOICE INPUT

function startListening(){

    if(!('webkitSpeechRecognition' in window)){

        alert("Speech Recognition not supported!");

        return;
    }

    const recognition =
    new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.continuous = true;

    recognition.interimResults = true;

    recognition.start();

    document.getElementById("status")
            .innerText = "🎤 Listening...";

    recognition.onresult = function(event){

        let finalText = "";

        for(let i = 0; i < event.results.length; i++){

            finalText +=
            event.results[i][0].transcript + " ";
        }

        document.getElementById("answer")
                .value = finalText;

        document.getElementById("status")
                .innerText = "🎤 Listening...";
    };

    recognition.onerror = function(){

        document.getElementById("status")
                .innerText = "❌ Voice recognition failed";
    };

    setTimeout(() => {

        recognition.stop();

        document.getElementById("status")
                .innerText =
                "✅ Recording stopped after 1 minute";

    }, 60000);

}

</script>

</body>
</html>
