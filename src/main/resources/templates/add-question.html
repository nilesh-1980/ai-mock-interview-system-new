<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Add Question</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:500px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
    font-size:30px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
    color:#444;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    transition:0.3s;
}

textarea{
    width:100%;
    height:180px;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    resize:none;
    transition:0.3s;
}

input:focus,
textarea:focus{
    border-color:#667eea;
    outline:none;
    box-shadow:0 0 10px rgba(102,126,234,0.3);
}

button{
    width:100%;
    padding:15px;
    margin-top:25px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#667eea;
    font-weight:bold;
}

.back-btn:hover{
    color:#764ba2;
}

</style>

</head>

<body>

<div class="container">

    <h2>Add Interview Question</h2>

    <form th:action="@{/admin/save-question}"
          th:object="${question}"
          method="post">

        <label>Category</label>

        <input 
            type="text"
            th:field="*{category}"
            placeholder="Enter category"
            required
        >

        <label>Question</label>

        <textarea
            th:field="*{questionText}"
            placeholder="Enter interview question"
            required>
        </textarea>

        <button type="submit">
            Save Question
        </button>

    </form>

    <a href="/dashboard" class="back-btn">
        ← Back To Dashboard
    </a>

</div>

</body>
</html>
